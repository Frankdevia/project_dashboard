<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proyectos por Líder - Project Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e1117;
    --bg-card: #161b22;
    --bg-card-hover: #1c2129;
    --bg-input: #0d1117;
    --border: rgba(255,255,255,0.08);
    --border-focus: rgba(255,255,255,0.2);
    --text: #e6edf3;
    --text-muted: #8b949e;
    --text-dim: #484f58;
    --accent: #58a6ff;
    --red: #f85149;
    --amber: #d29922;
    --blue: #58a6ff;
    --green: #3fb950;
    --radius: 16px;
    --radius-sm: 10px;
    --font-display: 'Outfit', sans-serif;
    --font-body: 'DM Sans', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    padding: 0;
  }

  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
  }

  .header {
    padding: 2.5rem 2rem 1.5rem;
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 1rem;
  }

  .header-left { flex: 1; }
  .header-left h1 { font-family: var(--font-display); font-weight: 700; font-size: 2rem; letter-spacing: -0.03em; color: var(--text); }
  .header-left h1 span { color: var(--text-dim); font-weight: 300; }
  .header-left p { color: var(--text-muted); font-size: 0.875rem; margin-top: 0.25rem; }

  .nav-links { display: flex; gap: 10px; flex-wrap: wrap; }
  .nav-links a { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0.6rem 1.2rem; color: var(--text); text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: all 0.2s; display: flex; align-items: center; gap: 0.5rem; }
  .nav-links a svg { opacity: 0.7; transition: opacity 0.2s; }
  .nav-links a:hover { background: var(--bg-card-hover); border-color: var(--border-focus); }
  .nav-links a:hover svg { opacity: 1; }
  .nav-links a.active { background: var(--accent); color: #000; border-color: var(--accent); }
  .nav-links a.active svg { opacity: 1; }

  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 2rem 3rem;
  }

  .leaders-grid {
    display: grid;
    gap: 2rem;
  }

  .leader-section {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 2rem;
    transition: border-color 0.2s;
  }

  .leader-section:hover {
    border-color: var(--border-focus);
  }

  .leader-header {
    display: flex;
    align-items: center;
    gap: 2rem;
    margin-bottom: 2rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  .leader-avatar-large {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: rgba(88,166,255,0.15);
    border: 3px solid transparent;
    background-image: linear-gradient(var(--bg-card), var(--bg-card)),
                      linear-gradient(135deg, rgba(88,166,255,0.8), rgba(139,148,158,0.5));
    background-origin: border-box;
    background-clip: padding-box, border-box;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-size: 3rem;
    flex-shrink: 0;
  }

  .leader-avatar-large img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .leader-avatar-large.no-photo {
    background: rgba(88,166,255,0.08);
    background-image: linear-gradient(var(--bg-card), var(--bg-card)),
                      linear-gradient(135deg, rgba(88,166,255,0.4), rgba(139,148,158,0.3));
    background-origin: border-box;
    background-clip: padding-box, border-box;
  }

  .leader-avatar-large.no-photo::after {
    content: '';
    display: block;
    width: 50px;
    height: 50px;
    background: currentColor;
    opacity: 0.3;
    -webkit-mask: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>') center/contain no-repeat;
    mask: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>') center/contain no-repeat;
  }

  .leader-info {
    flex: 1;
  }

  .leader-name {
    font-family: var(--font-display);
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 1rem;
  }

  .leader-stats {
    display: flex;
    gap: 2rem;
    flex-wrap: wrap;
  }

  .stat-box {
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
  }

  .stat-label {
    font-size: 0.75rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 600;
  }

  .stat-value {
    font-family: var(--font-display);
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--text);
  }

  .stat-value.completed {
    color: var(--green);
  }

  .stat-value.pending {
    color: var(--amber);
  }

  .stat-value.average {
    color: var(--accent);
  }

  .progress-ring {
    width: 80px;
    height: 80px;
    position: relative;
    flex-shrink: 0;
  }

  .progress-ring svg {
    transform: rotate(-90deg);
  }

  .progress-ring-circle {
    fill: none;
    stroke: rgba(255,255,255,0.1);
    stroke-width: 8;
  }

  .progress-ring-progress {
    fill: none;
    stroke: var(--accent);
    stroke-width: 8;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.5s;
  }

  .progress-ring-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: var(--font-display);
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--accent);
  }

  .projects-list {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .project-item {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 1rem 1.25rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    transition: all 0.2s;
    cursor: pointer;
  }

  .project-item:hover {
    background: rgba(255,255,255,0.06);
    border-color: var(--border-focus);
    transform: translateX(4px);
  }

  .project-status-indicator {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .project-info {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
  }

  .project-name {
    font-weight: 600;
    font-size: 0.95rem;
    color: var(--text);
  }

  .project-meta {
    font-size: 0.75rem;
    color: var(--text-muted);
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .project-progress {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .progress-bar {
    width: 120px;
    height: 6px;
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.3s;
  }

  .progress-percent {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 0.9rem;
    min-width: 45px;
    text-align: right;
  }

  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--text-dim);
    font-size: 0.9rem;
  }

  .empty-state .icon {
    font-size: 2.5rem;
    margin-bottom: 0.75rem;
    opacity: 0.3;
  }

  @media (max-width: 600px) {
    .header, .container {
      padding-left: 1rem;
      padding-right: 1rem;
    }
    .leader-header {
      flex-direction: column;
      text-align: center;
    }
    .leader-stats {
      justify-content: center;
    }
  }
  /* ── Auth UI ── */
  .nav-btn { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0.6rem 1.2rem; color: var(--text); font-family: var(--font-body); font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 0.5rem; }
  .nav-btn svg { opacity: 0.7; transition: opacity 0.2s; }
  .nav-btn:hover { background: var(--bg-card-hover); border-color: var(--border-focus); }
  .nav-btn:hover svg { opacity: 1; }
  body.readonly .write-action { display: none !important; }
  /* ── Detail Modal ── */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 5000; align-items: center; justify-content: center; padding: 1rem; backdrop-filter: blur(4px); }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--bg-card); border: 1px solid var(--border-focus); border-radius: var(--radius); padding: 1.75rem; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; animation: slideUp 0.22s ease-out; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  .detail-header { text-align: center; padding-bottom: 1rem; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; }
  .detail-header h3 { font-family: var(--font-display); font-weight: 600; font-size: 1.3rem; margin-bottom: 0.5rem; }
  .lider-chip { display: inline-block; background: rgba(88,166,255,0.15); color: var(--accent); padding: 0.3rem 0.7rem; border-radius: 6px; font-size: 0.8rem; font-weight: 600; margin: 0.25rem 0; }
  .status-chip { display: inline-block; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; padding: 0.3rem 0.8rem; border-radius: 6px; margin: 0.25rem 0; }
  .detail-section { margin-bottom: 1.5rem; }
  .detail-section h4 { font-size: 0.82rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; margin-bottom: 0.5rem; }
  .detail-section p { color: var(--text); font-size: 0.95rem; line-height: 1.6; }
  .detail-section .empty-value { color: var(--text-dim); font-style: italic; }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
  .detail-item { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0.8rem; }
  .detail-item label { display: block; font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; margin-bottom: 0.3rem; }
  .detail-item .value { font-size: 1rem; color: var(--text); font-weight: 500; }
  .detail-item .value.highlight { font-weight: 700; font-size: 1.2rem; font-family: var(--font-display); }
  .detail-actions { display: flex; gap: 10px; justify-content: flex-end; padding-top: 1rem; border-top: 1px solid var(--border); margin-top: 0.5rem; }
  .detail-actions button { border: none; border-radius: var(--radius-sm); padding: 0.6rem 1.4rem; font-family: var(--font-body); font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
  .btn-close-detail { background: transparent; color: var(--text-muted); border: 1px solid var(--border) !important; }
  .btn-close-detail:hover { color: var(--text); border-color: var(--border-focus) !important; }
  .btn-edit-detail { background: var(--accent); color: #000; }
  .btn-edit-detail:hover { opacity: 0.85; }
  /* ── Edit form ── */
  .modal .field { margin-bottom: 1rem; }
  .modal .field label { display: block; font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.35rem; text-transform: uppercase; letter-spacing: 0.04em; font-weight: 600; }
  .modal .field input, .modal .field select, .modal .field textarea { width: 100%; background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0.6rem 0.9rem; color: var(--text); font-family: var(--font-body); font-size: 0.9rem; outline: none; transition: border-color 0.2s; }
  .modal .field input:focus, .modal .field select:focus, .modal .field textarea:focus { border-color: var(--accent); }
  .modal .field input::placeholder, .modal .field textarea::placeholder { color: var(--text-dim); }
  .modal .field select { cursor: pointer; }
  .modal .field textarea { resize: vertical; min-height: 80px; }
  .modal .btn-row { display: flex; gap: 10px; justify-content: flex-end; margin-top: 1.5rem; }
  .modal .btn-row button { border: none; border-radius: var(--radius-sm); padding: 0.55rem 1.3rem; font-family: var(--font-body); font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: opacity 0.15s, transform 0.1s; }
  .modal .btn-row button:active { transform: scale(0.97); }
  .modal .btn-cancel { background: transparent; color: var(--text-muted); border: 1px solid var(--border) !important; }
  .modal .btn-cancel:hover { color: var(--text); border-color: var(--border-focus) !important; }
  .modal .btn-save { background: var(--accent); color: #000; }
  .modal .btn-save:hover { opacity: 0.85; }
  .nav-user { display: flex; align-items: center; gap: 0.5rem; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0.4rem 0.75rem 0.4rem 1rem; }
  .nav-user-name { font-size: 0.85rem; font-weight: 600; color: var(--green); }
  .nav-user-sep { color: var(--border-focus); }
  .login-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.65); backdrop-filter: blur(8px); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 1rem; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .login-backdrop.open { opacity: 1; pointer-events: all; }
  .login-modal { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); width: 100%; max-width: 380px; transform: translateY(12px); transition: transform 0.2s; }
  .login-backdrop.open .login-modal { transform: translateY(0); }
  .login-modal-header { padding: 1.5rem 1.5rem 0; display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
  .login-modal-header h3 { font-family: var(--font-display); font-size: 1.2rem; font-weight: 600; }
  .login-close { background: transparent; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.4rem; line-height: 1; transition: color 0.2s; }
  .login-close:hover { color: var(--text); }
  .login-modal-body { padding: 0 1.5rem 1.5rem; }
  .login-group { margin-bottom: 1rem; }
  .login-group label { display: block; font-size: 0.78rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.4rem; }
  .login-input { width: 100%; background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-family: var(--font-body); font-size: 0.9rem; padding: 0.6rem 0.85rem; outline: none; transition: border-color 0.2s; }
  .login-input:focus { border-color: var(--accent); }
  .login-error { color: var(--red); font-size: 0.82rem; margin-top: 0.75rem; display: none; }
  .login-footer { display: flex; justify-content: flex-end; gap: 0.75rem; margin-top: 1.25rem; }
  .login-cancel { background: transparent; border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-muted); font-family: var(--font-body); font-size: 0.9rem; padding: 0.6rem 1.1rem; cursor: pointer; transition: all 0.2s; }
  .login-cancel:hover { border-color: var(--border-focus); color: var(--text); }
  .login-submit { background: var(--accent); border: 1px solid var(--accent); border-radius: var(--radius-sm); color: #000; font-family: var(--font-body); font-size: 0.9rem; font-weight: 700; padding: 0.6rem 1.5rem; cursor: pointer; transition: opacity 0.2s; }
  .login-submit:hover { opacity: 0.85; }
</style>
</head>

    <p id="subtitle">Proyectos agrupados por líder</p>

<!-- Login Modal -->
<div class="login-backdrop" id="loginModal">
  <div class="login-modal">
    <div class="login-modal-header">
      <h3>Iniciar sesión</h3>
      <button class="login-close" onclick="closeLoginModal()">&times;</button>
    </div>
    <div class="login-modal-body">
      <div class="login-group"><label>Usuario</label><input class="login-input" type="text" id="loginUser" placeholder="Usuario" autocomplete="username"></div>
      <div class="login-group"><label>Contraseña</label><input class="login-input" type="password" id="loginPass" placeholder="Contraseña" autocomplete="current-password"></div>
      <div class="login-error" id="loginError"></div>
      <div class="login-footer"><button class="login-cancel" onclick="closeLoginModal()">Cancelar</button><button class="login-submit" onclick="doLogin()">Entrar</button></div>
    </div>
  </div>
</div>

<!-- Edit Project Modal -->
<div class="modal-overlay" id="editProjectModal">
  <div class="modal">
    <h3>Editar Proyecto</h3>
    <div class="field"><label>Nombre del proyecto</label><input type="text" id="epName" placeholder="Nombre del proyecto"></div>
    <div class="field"><label>Líder</label><select id="epLider"><option value="">Seleccionar líder</option></select></div>
    <div class="field"><label>Dependencia</label><input type="text" id="epDep" placeholder="Departamento o dependencia"></div>
    <div class="field"><label>Descripción</label><textarea id="epDesc" placeholder="Descripción del proyecto"></textarea></div>
    <div class="field"><label>Fecha de inicio</label><input type="date" id="epFechaInicio"></div>
    <div class="field"><label>Fecha de finalización</label><input type="date" id="epFechaFin"></div>
    <div class="field"><label>Progreso (%)</label><input type="number" id="epPct" min="0" max="100" step="1" placeholder="0 - 100"></div>
    <div class="field"><label>Horas ahorradas</label><input type="number" id="epHours" min="0" step="1" placeholder="0"></div>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeEditProjectModal()">Cancelar</button>
      <button class="btn-save" onclick="saveEditProject()">Guardar</button>
    </div>
  </div>
</div>

<!-- Project Detail Modal -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <div class="detail-header">
      <h3 id="dName"></h3>
      <div id="dLider"></div>
      <div id="dStatus"></div>
    </div>
    <div class="detail-grid">
      <div class="detail-item">
        <label>Progreso</label>
        <div class="value highlight" id="dPct"></div>
      </div>
      <div class="detail-item">
        <label>Horas ahorradas</label>
        <div class="value highlight" id="dHours" style="color:var(--green)"></div>
      </div>
    </div>
    <div class="detail-section">
      <h4>Descripción</h4>
      <p id="dDesc"></p>
    </div>
    <div class="detail-section">
      <h4>Dependencia</h4>
      <p id="dDep"></p>
    </div>
    <div class="detail-grid">
      <div class="detail-item">
        <label>Fecha de inicio</label>
        <div class="value" id="dFechaInicio"></div>
      </div>
      <div class="detail-item">
        <label>Fecha de finalización</label>
        <div class="value" id="dFechaFin"></div>
      </div>
    </div>
    <div class="detail-actions">
      <button class="btn-close-detail" onclick="closeDetailModal()">Cerrar</button>
      <button class="btn-edit-detail write-action" id="blEditBtn">✎ Editar</button>
    </div>
  </div>
</div>

<div class="container">
  <div class="leaders-grid" id="leadersGrid"></div>
</div>

<script>
const API_PROJECTS = '/api/projects';
const API_LEADERS = '/api/leaders';

let projects = [];
let leaders = [];

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function colorFor(p) {
  if (p >= 100) return { color: '#3fb950', label: 'Completado' };
  if (p >= 75)  return { color: '#58a6ff', label: 'Avanzado' };
  if (p >= 40)  return { color: '#d29922', label: 'En progreso' };
  return { color: '#f85149', label: 'Inicio' };
}

function createProgressRing(percent) {
  const radius = 36;
  const circumference = 2 * Math.PI * radius;
  const offset = circumference - (percent / 100) * circumference;

  return `
    <div class="progress-ring">
      <svg width="80" height="80">
        <circle class="progress-ring-circle" cx="40" cy="40" r="${radius}"></circle>
        <circle class="progress-ring-progress" cx="40" cy="40" r="${radius}"
                style="stroke-dasharray: ${circumference}; stroke-dashoffset: ${offset};"></circle>
      </svg>
      <div class="progress-ring-text">${Math.round(percent)}%</div>
    </div>
  `;
}

async function loadData() {
  try {
    const [projectsRes, leadersRes] = await Promise.all([
      fetch(API_PROJECTS),
      fetch(API_LEADERS)
    ]);

    projects = await projectsRes.json();
    leaders = await leadersRes.json();

    renderLeaderSections();
  } catch (err) {
    console.error('Error loading data:', err);
    document.getElementById('leadersGrid').innerHTML = `
      <div class="empty-state">
        <div class="icon">⚠️</div>
        Error al cargar datos
      </div>
    `;
  }
}

function renderLeaderSections() {
  const grid = document.getElementById('leadersGrid');

  // Group projects by leader
  const projectsByLeader = {};

  leaders.forEach(leader => {
    projectsByLeader[leader.name] = {
      leader: leader,
      projects: projects.filter(p => p.lider === leader.name)
    };
  });

  // Also add projects without leader
  const noLeaderProjects = projects.filter(p => !p.lider || p.lider === '');
  if (noLeaderProjects.length > 0) {
    projectsByLeader['Sin asignar'] = {
      leader: { id: 'unassigned', name: 'Sin asignar', photo: null },
      projects: noLeaderProjects
    };
  }

  // Filter out leaders with no projects
  const leadersWithProjects = Object.entries(projectsByLeader)
    .filter(([_, data]) => data.projects.length > 0)
    .sort((a, b) => b[1].projects.length - a[1].projects.length);

  if (leadersWithProjects.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="opacity: 0.3; margin-bottom: 1rem;">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
          <line x1="12" y1="18" x2="12" y2="12"></line>
          <line x1="9" y1="15" x2="15" y2="15"></line>
        </svg>
        <div>No hay proyectos asignados todavía</div>
      </div>
    `;
    return;
  }

  grid.innerHTML = leadersWithProjects.map(([leaderName, data]) => {
    const { leader, projects: leaderProjects } = data;

    // Calculate stats
    const totalProjects = leaderProjects.length;
    const completedProjects = leaderProjects.filter(p => p.pct >= 100).length;
    const pendingProjects = totalProjects - completedProjects;
    const averageProgress = totalProjects > 0
      ? Math.round(leaderProjects.reduce((sum, p) => sum + p.pct, 0) / totalProjects)
      : 0;

    // Leader photo
    const avatarHTML = leader.photo
      ? `<img src="${leader.photo}" alt="${esc(leaderName)}" />`
      : '';
    const avatarClass = leader.photo ? '' : 'no-photo';

    // Projects list
    const projectsHTML = leaderProjects
      .sort((a, b) => b.pct - a.pct) // Sort by progress descending
      .map(project => {
        const c = colorFor(project.pct);
        const meta = [];
        if (project.dep) meta.push(`${esc(project.dep)}`);
        if (project.fechaInicio || project.fechaFin) {
          meta.push(`${project.fechaInicio || '?'} - ${project.fechaFin || '?'}`);
        }
        if (project.hours) meta.push(`${project.hours}h`);

        return `
          <div class="project-item" style="cursor:pointer" onclick="openDetailModal('${project.id}')">
            <div class="project-status-indicator" style="background: ${c.color};"></div>
            <div class="project-info">
              <div class="project-name">${esc(project.name)}</div>
              ${meta.length > 0 ? `<div class="project-meta">${meta.join(' • ')}</div>` : ''}
            </div>
            <div class="project-progress">
              <div class="progress-bar">
                <div class="progress-bar-fill" style="width: ${project.pct}%; background: ${c.color};"></div>
              </div>
              <div class="progress-percent" style="color: ${c.color};">${Math.round(project.pct)}%</div>
            </div>
          </div>
        `;
      }).join('');

    return `
      <div class="leader-section">
        <div class="leader-header">
          <div class="leader-avatar-large ${avatarClass}">
            ${avatarHTML}
          </div>
          <div class="leader-info">
            <div class="leader-name">${esc(leaderName)}</div>
            <div class="leader-stats">
              <div class="stat-box">
                <div class="stat-label">Total Proyectos</div>
                <div class="stat-value">${totalProjects}</div>
              </div>
              <div class="stat-box">
                <div class="stat-label">Completados</div>
                <div class="stat-value completed">${completedProjects}</div>
              </div>
              <div class="stat-box">
                <div class="stat-label">Pendientes</div>
                <div class="stat-value pending">${pendingProjects}</div>
              </div>
              <div class="stat-box">
                <div class="stat-label">Promedio</div>
                <div class="stat-value average">${averageProgress}%</div>
              </div>
            </div>
          </div>
          ${createProgressRing(averageProgress)}
        </div>
        <div class="projects-list">
          ${projectsHTML}
        </div>
      </div>
    `;
  }).join('');
}

loadData();
setInterval(loadData, 30000);

// ── Detail Modal ──
const detailModal = document.getElementById('detailModal');

function colorFor(p) {
  if (p >= 100) return { color: '#3fb950', label: 'Completado', bg: 'rgba(63,185,80,0.12)' };
  if (p >= 75)  return { color: '#58a6ff', label: 'Avanzado', bg: 'rgba(88,166,255,0.12)' };
  if (p >= 40)  return { color: '#d29922', label: 'En progreso', bg: 'rgba(210,153,34,0.12)' };
  return              { color: '#f85149', label: 'Inicio', bg: 'rgba(248,81,73,0.12)' };
}

function openDetailModal(id) {
  const p = projects.find(pr => pr.id === id);
  if (!p) return;
  const c = colorFor(p.pct);
  document.getElementById('dName').textContent = p.name;
  document.getElementById('dLider').innerHTML = p.lider
    ? `<span class="lider-chip">${esc(p.lider)}</span>` : '';
  document.getElementById('dStatus').innerHTML = `<span class="status-chip" style="background:${c.bg};color:${c.color}">${c.label}</span>`;
  const pctEl = document.getElementById('dPct');
  pctEl.textContent = Math.round(p.pct) + '%';
  pctEl.style.color = c.color;
  document.getElementById('dHours').textContent = (p.hours || 0).toLocaleString() + 'h';
  const desc = document.getElementById('dDesc');
  desc.textContent = p.descripcion || 'Sin descripción';
  desc.className = p.descripcion ? '' : 'empty-value';
  const dep = document.getElementById('dDep');
  dep.textContent = p.dep || 'Sin dependencia asignada';
  dep.className = p.dep ? '' : 'empty-value';
  document.getElementById('dFechaInicio').textContent = p.fechaInicio || '—';
  document.getElementById('dFechaFin').textContent = p.fechaFin || '—';
  document.getElementById('blEditBtn').onclick = () => {
    closeDetailModal();
    openEditProjectModal(id);
  };
  detailModal.classList.add('open');
}

function closeDetailModal() {
  detailModal.classList.remove('open');
}

detailModal.addEventListener('click', e => {
  if (e.target === detailModal) closeDetailModal();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && detailModal.classList.contains('open')) closeDetailModal();
});

// ── Edit Project Modal ──
let editingProjectId = null;

async function openEditProjectModal(id) {
  const p = projects.find(pr => pr.id === id);
  if (!p) return;
  editingProjectId = id;
  try {
    const res = await fetch('/api/leaders');
    const list = await res.json();
    const sel = document.getElementById('epLider');
    sel.innerHTML = '<option value="">Seleccionar líder</option>';
    list.forEach(l => {
      const o = document.createElement('option');
      o.value = l.name; o.textContent = l.name;
      if (l.name === p.lider) o.selected = true;
      sel.appendChild(o);
    });
  } catch {}
  document.getElementById('epName').value = p.name || '';
  document.getElementById('epDep').value = p.dep || '';
  document.getElementById('epDesc').value = p.descripcion || '';
  document.getElementById('epFechaInicio').value = p.fechaInicio || '';
  document.getElementById('epFechaFin').value = p.fechaFin || '';
  document.getElementById('epPct').value = p.pct != null ? p.pct : '';
  document.getElementById('epHours').value = p.hours || '';
  document.getElementById('editProjectModal').classList.add('open');
  document.getElementById('epName').focus();
}

function closeEditProjectModal() {
  document.getElementById('editProjectModal').classList.remove('open');
  editingProjectId = null;
}

async function saveEditProject() {
  const name = document.getElementById('epName').value.trim();
  if (!name) { document.getElementById('epName').focus(); return; }
  const data = {
    name,
    lider: document.getElementById('epLider').value,
    dep: document.getElementById('epDep').value,
    descripcion: document.getElementById('epDesc').value,
    fechaInicio: document.getElementById('epFechaInicio').value,
    fechaFin: document.getElementById('epFechaFin').value,
    pct: Math.max(0, Math.min(100, Number(document.getElementById('epPct').value) || 0)),
    hours: Math.max(0, Number(document.getElementById('epHours').value) || 0)
  };
  try {
    const r = await fetch(`/api/projects/${editingProjectId}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    if (!r.ok) throw new Error();
    closeEditProjectModal();
    await loadData();
  } catch { alert('Error al guardar el proyecto'); }
}

document.getElementById('editProjectModal').addEventListener('click', e => {
  if (e.target === document.getElementById('editProjectModal')) closeEditProjectModal();
});

// ── Auth ──
async function checkSession() {
  try {
    const { admin, user } = await fetch('/api/me').then(r => r.json());
    if (admin) {
      document.body.classList.remove('readonly');
      document.getElementById('btnLogin').style.display = 'none';
      document.getElementById('userInfo').style.display = 'flex';
      document.getElementById('userName').textContent = user;
    } else {
      document.body.classList.add('readonly');
    }
  } catch { document.body.classList.add('readonly'); }
}
function openLoginModal() {
  document.getElementById('loginModal').style.display = 'flex';
  setTimeout(() => document.getElementById('loginUser').focus(), 50);
}
function closeLoginModal() {
  document.getElementById('loginModal').style.display = 'none';
  document.getElementById('loginError').textContent = '';
}
async function doLogin() {
  const user = document.getElementById('loginUser').value.trim();
  const pass = document.getElementById('loginPass').value;
  document.getElementById('loginError').textContent = '';
  try {
    const r = await fetch('/api/login', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ user, pass }) });
    const data = await r.json();
    if (!r.ok) { document.getElementById('loginError').textContent = data.error || 'Error'; return; }
    closeLoginModal();
    document.body.classList.remove('readonly');
    document.getElementById('btnLogin').style.display = 'none';
    document.getElementById('userInfo').style.display = 'flex';
    document.getElementById('userName').textContent = data.name;
  } catch { document.getElementById('loginError').textContent = 'Error de conexión'; }
}
async function doLogout() {
  await fetch('/api/logout', { method: 'POST' });
  document.body.classList.add('readonly');
  document.getElementById('btnLogin').style.display = 'flex';
  document.getElementById('userInfo').style.display = 'none';
}
document.getElementById('loginModal').addEventListener('click', e => { if (e.target === document.getElementById('loginModal')) closeLoginModal(); });
document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
checkSession();
</script>
</body>
</html>
