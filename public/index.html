<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e1117;
    --bg-card: #161b22;
    --bg-card-hover: #1c2129;
    --bg-input: #0d1117;
    --border: rgba(255,255,255,0.08);
    --border-focus: rgba(255,255,255,0.2);
    --text: #e6edf3;
    --text-muted: #8b949e;
    --text-dim: #484f58;
    --accent: #58a6ff;
    --red: #f85149;
    --amber: #d29922;
    --blue: #58a6ff;
    --green: #3fb950;
    --radius: 16px;
    --radius-sm: 10px;
    --font-display: 'Outfit', sans-serif;
    --font-body: 'DM Sans', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    padding: 0;
  }

  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
  }

  .header { padding: 2.5rem 2rem 1.5rem; max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
  .header-left { flex: 1; }
  .header-left h1 { font-family: var(--font-display); font-weight: 700; font-size: 2rem; letter-spacing: -0.03em; color: var(--text); }
  .header-left h1 span { color: var(--text-dim); font-weight: 300; }
  .header-left p { color: var(--text-muted); font-size: 0.875rem; margin-top: 0.25rem; }
  .nav-links { display: flex; gap: 10px; flex-wrap: wrap; }
  .nav-links a { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0.6rem 1.2rem; color: var(--text); text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: all 0.2s; display: flex; align-items: center; gap: 0.5rem; }
  .nav-links a svg { opacity: 0.7; transition: opacity 0.2s; }
  .nav-links a:hover { background: var(--bg-card-hover); border-color: var(--border-focus); }
  .nav-links a:hover svg { opacity: 1; }
  .nav-links a.active { background: var(--accent); color: #000; border-color: var(--accent); }
  .nav-links a.active svg { opacity: 1; }

  .summary { display: flex; gap: 1rem; max-width: 1200px; margin: 0 auto; padding: 0 2rem 1.5rem; flex-wrap: wrap; }
  .stat-pill { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0.6rem 1.2rem; font-size: 0.8rem; color: var(--text-muted); display: flex; align-items: center; gap: 0.5rem; }
  .stat-pill strong { font-size: 1.1rem; font-weight: 600; color: var(--text); font-family: var(--font-display); }
  .stat-pill.guardian-pill { transition: all 0.2s; }
  .stat-pill.guardian-pill:hover { background: var(--bg-card-hover); border-color: var(--border-focus); transform: translateY(-2px); }

  .add-form { max-width: 1200px; margin: 0 auto; padding: 0 2rem 2rem; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .add-form input { background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0.65rem 1rem; color: var(--text); font-family: var(--font-body); font-size: 0.9rem; outline: none; transition: border-color 0.2s; }
  .add-form input:focus { border-color: var(--border-focus); }
  .add-form input::placeholder { color: var(--text-dim); }
  .add-form input[type="text"] { flex: 1; min-width: 140px; }
  .add-form input[type="number"] { width: 90px; }
  .add-form select { background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0.65rem 1rem; color: var(--text); font-family: var(--font-body); font-size: 0.9rem; outline: none; transition: border-color 0.2s; min-width: 140px; cursor: pointer; }
  .add-form select:focus { border-color: var(--border-focus); }
  .add-form textarea { background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0.65rem 1rem; color: var(--text); font-family: var(--font-body); font-size: 0.9rem; outline: none; transition: border-color 0.2s; flex: 1; min-width: 200px; resize: vertical; min-height: 60px; }
  .add-form textarea:focus { border-color: var(--border-focus); }
  .add-form textarea::placeholder { color: var(--text-dim); }
  .add-form input[type="date"] { background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0.65rem 1rem; color: var(--text); font-family: var(--font-body); font-size: 0.9rem; outline: none; transition: border-color 0.2s; min-width: 140px; }
  .add-form input[type="date"]:focus { border-color: var(--border-focus); }
  .add-form button { background: var(--accent); color: #000; border: none; border-radius: var(--radius-sm); padding: 0.65rem 1.4rem; font-family: var(--font-body); font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s, transform 0.1s; }
  .add-form button:hover { opacity: 0.85; }
  .add-form button:active { transform: scale(0.97); }
  .add-form button:disabled { opacity: 0.4; cursor: not-allowed; }

  .filters { max-width: 1200px; margin: 0 auto; padding: 0 2rem 1.5rem; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .filters label { color: var(--text-muted); font-size: 0.85rem; font-weight: 500; }
  .filters select { background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0.5rem 0.9rem; color: var(--text); font-family: var(--font-body); font-size: 0.85rem; outline: none; transition: border-color 0.2s; cursor: pointer; }
  .filters select:focus { border-color: var(--border-focus); }
  .filters .excel-buttons { margin-left: auto; display: flex; gap: 8px; }
  .filters .excel-buttons button { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0.5rem 1rem; color: var(--text); font-family: var(--font-body); font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 0.4rem; }
  .filters .excel-buttons button:hover { background: var(--bg-card-hover); border-color: var(--border-focus); }
  .filters .excel-buttons button svg { opacity: 0.7; }
  .filters .excel-buttons button:hover svg { opacity: 1; }
  .filters .excel-buttons .btn-export { background: var(--green); border-color: var(--green); color: #000; }
  .filters .excel-buttons .btn-export:hover { opacity: 0.85; }
  .filters .excel-buttons input[type="file"] { display: none; }

  .progress-overview { max-width: 1200px; margin: 0 auto; padding: 0 2rem 2rem; }
  .progress-overview h2 { font-family: var(--font-display); font-weight: 600; font-size: 1.3rem; color: var(--text); margin-bottom: 1.5rem; }
  .projects-summary { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem; }
  .project-summary-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; transition: all 0.2s; cursor: pointer; }
  .project-summary-card:hover { background: var(--bg-card-hover); border-color: var(--border-focus); transform: translateY(-2px); }
  .project-summary-card h3 { font-family: var(--font-display); font-size: 1.05rem; font-weight: 600; color: var(--text); margin-bottom: 0.75rem; }
  .project-summary-card .leader-name { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.5rem; }
  .project-summary-card .leader-name strong { color: var(--accent); }
  .project-summary-card .progress-bar { width: 100%; height: 8px; background: rgba(255,255,255,0.05); border-radius: 4px; overflow: hidden; margin: 0.75rem 0; }
  .project-summary-card .progress-fill { height: 100%; border-radius: 4px; transition: width 0.3s ease; }
  .project-summary-card .progress-text { font-size: 0.75rem; color: var(--text-muted); display: flex; justify-content: space-between; align-items: center; }
  .project-summary-card .progress-text strong { font-size: 1.1rem; font-weight: 700; font-family: var(--font-display); }

  .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem 1rem 1rem; text-align: center; position: relative; transition: background 0.2s, border-color 0.2s, transform 0.2s; animation: cardIn 0.35s ease-out both; }
  .card:hover { background: var(--bg-card-hover); border-color: var(--border-focus); transform: translateY(-2px); }
  @keyframes cardIn { from { opacity: 0; transform: translateY(12px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }

  .card .name { font-family: var(--font-display); font-weight: 500; font-size: 0.95rem; color: var(--text); margin-top: 0.25rem; word-break: break-word; }
  .card .pct-label { font-family: var(--font-display); font-weight: 700; font-size: 1.6rem; margin-top: 0.15rem; letter-spacing: -0.02em; }
  .card .status-tag { display: inline-block; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; padding: 0.2rem 0.6rem; border-radius: 6px; margin-top: 0.5rem; }

  .card .actions { position: absolute; top: 8px; right: 8px; display: flex; gap: 2px; opacity: 0; transition: opacity 0.2s; }
  .card:hover .actions { opacity: 1; }
  .card .actions button { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 0.8rem; padding: 4px 6px; border-radius: 6px; transition: color 0.15s, background 0.15s; }
  .card .actions button:hover { color: var(--text); background: rgba(255,255,255,0.06); }
  .card .actions button.del:hover { color: var(--red); }

  .card .meta { margin-top: 0.5rem; padding-top: 0.5rem; border-top: 1px solid var(--border); font-size: 0.75rem; color: var(--text-muted); display: flex; flex-direction: column; gap: 4px; }
  .card .meta-row { display: flex; justify-content: space-between; gap: 6px; align-items: center; }
  .card .meta span { display: flex; align-items: center; gap: 4px; }
  .card .meta .hours-val { color: var(--green); font-weight: 600; }
  .card .lider-badge { display: inline-block; background: rgba(88,166,255,0.15); color: var(--accent); padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.7rem; font-weight: 600; }
  .card .desc { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.5rem; line-height: 1.4; max-height: 3.2em; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

  .card .leader-avatar {
    position: absolute;
    bottom: 12px;
    right: 12px;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(88,166,255,0.15);
    border: 2px solid transparent;
    background-image: linear-gradient(var(--bg-card), var(--bg-card)),
                      linear-gradient(135deg, rgba(88,166,255,0.6), rgba(139,148,158,0.4));
    background-origin: border-box;
    background-clip: padding-box, border-box;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-size: 1.2rem;
  }

  .card .leader-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .card .leader-avatar.no-photo {
    background: rgba(88,166,255,0.05);
    background-image: linear-gradient(var(--bg-card), var(--bg-card)),
                      linear-gradient(135deg, rgba(88,166,255,0.3), rgba(139,148,158,0.2));
    background-origin: border-box;
    background-clip: padding-box, border-box;
  }

  .card .leader-avatar.no-photo::after {
    content: '';
    display: block;
    width: 20px;
    height: 20px;
    background: currentColor;
    opacity: 0.4;
    -webkit-mask: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>') center/contain no-repeat;
    mask: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>') center/contain no-repeat;
  }

  .chart-section { max-width: 1200px; margin: 0 auto; padding: 0 2rem 3rem; }
  .chart-section h2 { font-family: var(--font-display); font-weight: 500; font-size: 1.1rem; color: var(--text); margin-bottom: 1rem; letter-spacing: -0.01em; }
  .chart-section h2 span { color: var(--text-dim); font-weight: 300; }
  .chart-panel { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; }

  .bar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .bar-row:last-child { margin-bottom: 0; }
  .bar-label { width: 140px; min-width: 100px; font-size: 0.8rem; font-family: var(--font-display); font-weight: 500; color: var(--text); text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .bar-track { flex: 1; height: 28px; background: rgba(255,255,255,0.04); border-radius: 6px; position: relative; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 6px; transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1); display: flex; align-items: center; padding-left: 10px; min-width: 0; }
  .bar-fill-text { font-size: 0.75rem; font-weight: 600; font-family: var(--font-display); white-space: nowrap; }
  .bar-value { width: 70px; text-align: right; font-size: 0.85rem; font-family: var(--font-display); font-weight: 600; color: var(--text); }
  .bar-projects { font-size: 0.7rem; color: var(--text-muted); margin-top: 2px; padding-left: 152px; }
  .bar-group { margin-bottom: 16px; }
  .bar-group:last-child { margin-bottom: 0; }
  .chart-totals { display: flex; gap: 1.5rem; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .chart-totals .ct-item { font-size: 0.8rem; color: var(--text-muted); }
  .chart-totals .ct-item strong { font-size: 1.15rem; font-weight: 700; font-family: var(--font-display); color: var(--green); margin-left: 4px; }

  .empty { grid-column: 1 / -1; text-align: center; padding: 4rem 1rem; color: var(--text-dim); font-size: 0.9rem; }
  .empty .icon { font-size: 2.5rem; margin-bottom: 0.75rem; opacity: 0.3; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 5000; align-items: center; justify-content: center; padding: 1rem; backdrop-filter: blur(4px); animation: fadeIn 0.2s ease-out; }
  .modal-overlay.open { display: flex; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal { background: var(--bg-card); border: 1px solid var(--border-focus); border-radius: var(--radius); padding: 1.75rem; width: 100%; max-width: 420px; animation: slideUp 0.25s ease-out; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .modal h3 { font-family: var(--font-display); font-weight: 600; font-size: 1.1rem; margin-bottom: 1.25rem; color: var(--text); }
  .modal .field { margin-bottom: 1rem; }
  .modal .field label { display: block; font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.35rem; text-transform: uppercase; letter-spacing: 0.04em; font-weight: 600; }
  .modal .field input { width: 100%; background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0.6rem 0.9rem; color: var(--text); font-family: var(--font-body); font-size: 0.9rem; outline: none; transition: border-color 0.2s; }
  .modal .field input:focus { border-color: var(--accent); }
  .modal .field input::placeholder { color: var(--text-dim); }
  .modal .field select { width: 100%; background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0.6rem 0.9rem; color: var(--text); font-family: var(--font-body); font-size: 0.9rem; outline: none; transition: border-color 0.2s; cursor: pointer; }
  .modal .field select:focus { border-color: var(--accent); }
  .modal .field textarea { width: 100%; background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0.6rem 0.9rem; color: var(--text); font-family: var(--font-body); font-size: 0.9rem; outline: none; transition: border-color 0.2s; resize: vertical; min-height: 80px; }
  .modal .field textarea:focus { border-color: var(--accent); }
  .modal .field textarea::placeholder { color: var(--text-dim); }
  .modal .btn-row { display: flex; gap: 10px; justify-content: flex-end; margin-top: 1.5rem; }
  .modal .btn-row button { border: none; border-radius: var(--radius-sm); padding: 0.55rem 1.3rem; font-family: var(--font-body); font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: opacity 0.15s, transform 0.1s; }
  .modal .btn-row button:active { transform: scale(0.97); }
  .modal .btn-cancel { background: transparent; color: var(--text-muted); border: 1px solid var(--border) !important; }
  .modal .btn-cancel:hover { color: var(--text); border-color: var(--border-focus) !important; }
  .modal .btn-save { background: var(--accent); color: #000; }
  .modal .btn-save:hover { opacity: 0.85; }

  .detail-modal { max-width: 600px; }
  .detail-header { text-align: center; padding-bottom: 1rem; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; }
  .detail-header .gauge-container { display: flex; justify-content: center; margin-bottom: 1rem; }
  .detail-header h3 { font-family: var(--font-display); font-weight: 600; font-size: 1.3rem; margin-bottom: 0.5rem; color: var(--text); }
  .detail-header .project-lider { display: inline-block; background: rgba(88,166,255,0.15); color: var(--accent); padding: 0.3rem 0.7rem; border-radius: 6px; font-size: 0.8rem; font-weight: 600; margin-bottom: 0.5rem; }
  .detail-header .project-status { display: inline-block; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; padding: 0.3rem 0.8rem; border-radius: 6px; }
  .detail-section { margin-bottom: 1.5rem; }
  .detail-section h4 { font-family: var(--font-display); font-weight: 600; font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
  .detail-section p { color: var(--text); font-size: 0.95rem; line-height: 1.6; margin: 0; }
  .detail-section .empty-value { color: var(--text-dim); font-style: italic; }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
  .detail-item { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0.8rem; }
  .detail-item label { display: block; font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; margin-bottom: 0.3rem; }
  .detail-item .value { font-size: 1rem; color: var(--text); font-weight: 500; }
  .detail-item .value.highlight { color: var(--green); font-weight: 700; font-size: 1.2rem; font-family: var(--font-display); }
  .detail-actions { display: flex; gap: 10px; justify-content: flex-end; padding-top: 1rem; border-top: 1px solid var(--border); }
  .detail-actions button { border: none; border-radius: var(--radius-sm); padding: 0.6rem 1.4rem; font-family: var(--font-body); font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: opacity 0.15s, transform 0.1s; }
  .detail-actions button:active { transform: scale(0.97); }
  .detail-actions .btn-edit { background: var(--accent); color: #000; }
  .detail-actions .btn-edit:hover { opacity: 0.85; }
  .detail-actions .btn-close { background: transparent; color: var(--text-muted); border: 1px solid var(--border) !important; }
  .detail-actions .btn-close:hover { color: var(--text); border-color: var(--border-focus) !important; }

  .sync-indicator { position: fixed; bottom: 1rem; right: 1rem; font-size: 0.75rem; color: var(--text-dim); font-family: var(--font-body); z-index: 100; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0.4rem 0.8rem; transition: opacity 0.3s; }
  .sync-indicator.syncing { color: var(--amber); }
  .sync-indicator.error { color: var(--red); }
  .sync-indicator.ok { color: var(--green); }

  @media (max-width: 600px) {
    .header, .summary, .add-form, .grid, .chart-section { padding-left: 1rem; padding-right: 1rem; }
    .header h1 { font-size: 1.5rem; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>Project Dashboard Technology Team Liceo Inglés</h1>
    <p id="subtitle">Cargando...</p>
  </div>
  <div class="nav-links">
    <a href="index.html" class="active">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="7"></rect>
        <rect x="14" y="3" width="7" height="7"></rect>
        <rect x="14" y="14" width="7" height="7"></rect>
        <rect x="3" y="14" width="7" height="7"></rect>
      </svg>
      Dashboard
    </a>
    <a href="projects.html">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
        <polyline points="14 2 14 8 20 8"></polyline>
        <line x1="16" y1="13" x2="8" y2="13"></line>

<div class="summary" id="summary" style="display:none;">
  <div class="stat-pill">Proyectos <strong id="sTotal">0</strong></div>
  <div class="stat-pill">Promedio <strong id="sAvg">0%</strong></div>
  <div class="stat-pill">Completados <strong id="sDone">0</strong></div>
  <div class="stat-pill">Horas ahorradas <strong id="sHours" style="color:var(--green)">0</strong></div>
  <div class="stat-pill guardian-pill" id="guardianPill" style="cursor: pointer;" onclick="window.location.href='tech-guardian.html'" title="Ver calendario completo de Tech Guardian">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="opacity: 0.7;">
      <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
    </svg>
    Guardian Today: <strong id="sGuardian" style="color:var(--accent)">-</strong>
  </div>
</div>

<div class="progress-overview">
  <h2>Resumen de Proyectos Activos</h2>
  <div class="projects-summary" id="projectsSummary"></div>
</div>


<div class="sync-indicator" id="syncStatus">Conectando...</div>

<script>
// ── API layer ──
const API = '/api/projects';

async function api(method, path = '', body = null) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API + path, opts);
  if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
  return res.json();
}

function showSync(cls, msg) {
  const el = document.getElementById('syncStatus');
  el.className = 'sync-indicator ' + cls;
  el.textContent = msg;
  if (cls === 'ok') setTimeout(() => { el.style.opacity = '0.4'; }, 1500);
  else el.style.opacity = '1';
}

// ── State ──
let projects = [];
let leaders = [];

const projectsSummary = document.getElementById('projectsSummary');
const subtitle = document.getElementById('subtitle');
const summary  = document.getElementById('summary');

// ── Color helpers ──
function colorFor(p) {
  if (p >= 100) return { arc: '#3fb950', text: '#3fb950', tag: 'rgba(63,185,80,0.12)', label: 'Completado' };
  if (p >= 75)  return { arc: '#58a6ff', text: '#58a6ff', tag: 'rgba(88,166,255,0.12)', label: 'Avanzado' };
  if (p >= 40)  return { arc: '#d29922', text: '#d29922', tag: 'rgba(210,153,34,0.12)', label: 'En progreso' };
  return              { arc: '#f85149', text: '#f85149', tag: 'rgba(248,81,73,0.12)', label: 'Inicio' };
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ── SVG gauge builder ──
function gaugeSVG(pct) {
  const c = colorFor(pct);
  const r = 68, cx = 90, cy = 88;
  const sa = Math.PI * 0.75, ea = Math.PI * 2.25;
  const total = ea - sa;
  const va = sa + total * (pct / 100);
  const pt = a => [cx + r * Math.cos(a), cy + r * Math.sin(a)];
  const [bx1, by1] = pt(sa);
  const [bx2, by2] = pt(ea);
  const [vx, vy]   = pt(va);
  const lv = (va - sa) > Math.PI ? 1 : 0;
  const nl = 50;
  const [nx, ny] = [cx + nl * Math.cos(va), cy + nl * Math.sin(va)];
  let ticks = '';
  for (let i = 0; i <= 10; i++) {
    const a = sa + total * (i / 10);
    const inner = r - 8, outer = r + 1;
    const [ix, iy] = [cx + inner * Math.cos(a), cy + inner * Math.sin(a)];
    const [ox, oy] = [cx + outer * Math.cos(a), cy + outer * Math.sin(a)];
    ticks += `<line x1="${ix}" y1="${iy}" x2="${ox}" y2="${oy}" stroke="rgba(255,255,255,0.12)" stroke-width="${i % 5 === 0 ? 2 : 1}"/>`;
  }
  return `<svg viewBox="0 0 180 130" width="180" height="130" xmlns="http://www.w3.org/2000/svg">
    <path d="M${bx1},${by1} A${r},${r} 0 1 1 ${bx2},${by2}" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="12" stroke-linecap="round"/>
    ${pct > 0 ? `<path d="M${bx1},${by1} A${r},${r} 0 ${lv} 1 ${vx},${vy}" fill="none" stroke="${c.arc}" stroke-width="12" stroke-linecap="round" style="filter:drop-shadow(0 0 6px ${c.arc}55)"/>` : ''}
    ${ticks}
    <circle cx="${cx}" cy="${cy}" r="5" fill="${c.arc}"/>
    <line x1="${cx}" y1="${cy}" x2="${nx}" y2="${ny}" stroke="${c.text}" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="${cx}" cy="${cy}" r="2.5" fill="#0e1117"/>
    <text x="24" y="122" font-size="10" fill="rgba(255,255,255,0.2)" font-family="'Outfit',sans-serif">0</text>
    <text x="143" y="122" font-size="10" fill="rgba(255,255,255,0.2)" font-family="'Outfit',sans-serif">100</text>
  </svg>`;
}

// ── Render ──
function render() {
  summary.style.display = projects.length ? 'flex' : 'none';
  const totalHours = projects.reduce((s, p) => s + (p.hours || 0), 0);

  if (projects.length) {
    const avg = Math.round(projects.reduce((s, p) => s + p.pct, 0) / projects.length);
    const done = projects.filter(p => p.pct >= 100).length;
    document.getElementById('sTotal').textContent = projects.length;
    document.getElementById('sAvg').textContent = avg + '%';
    document.getElementById('sDone').textContent = done;
    document.getElementById('sHours').textContent = totalHours.toLocaleString();
    subtitle.textContent = `${projects.length} proyecto${projects.length > 1 ? 's' : ''} · promedio ${avg}% · ${totalHours.toLocaleString()}h ahorradas`;
  } else {
    subtitle.textContent = 'Sin proyectos todavía';
  }

  // Render simple project summary
  projectsSummary.innerHTML = '';

  if (projects.length === 0) {
    projectsSummary.innerHTML = `
      <div style="grid-column: 1/-1; text-align: center; padding: 3rem; color: var(--text-muted);">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="opacity: 0.3; margin-bottom: 1rem;">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
          <line x1="12" y1="18" x2="12" y2="12"></line>
          <line x1="9" y1="15" x2="15" y2="15"></line>
        </svg>
        <div>No hay proyectos todavía</div>
        <div style="margin-top: 1rem;">
          <a href="projects.html" style="color: var(--accent); text-decoration: none;">Ir a Gestión de Proyectos →</a>
        </div>
      </div>
    `;
    return;
  }

  // Sort projects by progress (descending)
  const sortedProjects = [...projects].sort((a, b) => b.pct - a.pct);

  sortedProjects.forEach(p => {
    const c = colorFor(p.pct);
    const leader = leaders.find(l => l.name === p.lider);

    const card = document.createElement('div');
    card.className = 'card';
    card.onclick = () => window.location.href = 'projects.html';
    card.style.cursor = 'pointer';

    // Leader avatar
    let avatarHTML = '';
    if (leader && leader.photo) {
      avatarHTML = `<div class="leader-avatar"><img src="${leader.photo}" alt="${esc(leader.name)}"></div>`;
    } else if (p.lider) {
      avatarHTML = `<div class="leader-avatar no-photo"></div>`;
    }

    card.innerHTML = `
      ${gaugeSVG(p.pct)}
      <div class="name">${esc(p.name)}</div>
      <div class="pct-label" style="color:${c.text}">${Math.round(p.pct)}%</div>
      <div class="status-tag" style="background:${c.tag}; color:${c.text}">${c.label}</div>
      ${p.lider ? `<div class="meta"><div class="lider-badge">${esc(p.lider)}</div></div>` : ''}
      ${p.hours ? `<div class="meta"><span class="hours-val">${p.hours.toLocaleString()}h</span> ahorradas</div>` : ''}
      ${avatarHTML}
    `;

    projectsSummary.appendChild(card);
  });
}

// ── Load leaders ──
async function loadLeaders() {
  try {
    const res = await fetch('/api/leaders');
    leaders = await res.json();
  } catch (err) {
    console.error('Error loading leaders:', err);
  }
}

// ── Auto-refresh: poll every 15s so all team members see updates ──
async function loadProjects() {
  try {
    projects = await api('GET');
    showSync('ok', 'Sincronizado');
    render();
  } catch (err) {
    showSync('error', 'Sin conexión');
    subtitle.textContent = 'Error de conexión con el servidor';
  }
}

// ── Load Guardian Today ──
function loadGuardianToday() {
  const guardianSchedule = [
    { date: '07/04/2024', guardian: 'Breyns Solana' },
    { date: '08/04/2024', guardian: 'Breyns Solana' },
    { date: '09/04/2024', guardian: 'Breyns Solana' },
    { date: '10/04/2024', guardian: 'Jorge Agudelo' },
    { date: '14/04/2024', guardian: 'Jorge Agudelo' },
    { date: '15/04/2024', guardian: 'Reyes Gomez' },
    { date: '16/04/2024', guardian: 'Reyes Gomez' },
    { date: '17/04/2024', guardian: 'Jorge Agudelo' },
    { date: '18/04/2024', guardian: 'Jorge Agudelo' },
    { date: '22/04/2024', guardian: 'Jorge Agudelo' },
    { date: '23/04/2024', guardian: 'Breyns Escolar' },
    { date: '24/04/2024', guardian: 'Jorge Agudelo' },
    { date: '25/04/2024', guardian: 'Breyns Escolar' },
    { date: '26/04/2024', guardian: 'Breyns Escolar' },
    { date: '29/04/2024', guardian: 'Breyns Escolar' },
    { date: '30/04/2024', guardian: 'Jorge Agudelo' },
    { date: '01/05/2024', guardian: 'FESTIVO' },
    { date: '02/05/2024', guardian: 'Jorge Agudelo' },
    { date: '03/05/2024', guardian: 'Jorge Agudelo' },
    { date: '06/05/2024', guardian: 'Semana Solana' },
    { date: '07/05/2024', guardian: 'Jorge Agudelo' },
    { date: '08/05/2024', guardian: 'Jorge Agudelo' },
    { date: '09/05/2024', guardian: 'Breyns Escolar' },
    { date: '10/05/2024', guardian: 'Breyns Escolar' },
  ];

  function parseDate(dateStr) {
    const [day, month, year] = dateStr.split('/');
    return new Date(year, month - 1, day);
  }

  function isSameDay(date1, date2) {
    return date1.getDate() === date2.getDate() &&
           date1.getMonth() === date2.getMonth() &&
           date1.getFullYear() === date2.getFullYear();
  }

  const today = new Date();
  const todayEntry = guardianSchedule.find(item => {
    const itemDate = parseDate(item.date);
    return isSameDay(itemDate, today);
  });

  const guardianEl = document.getElementById('sGuardian');
  if (todayEntry) {
    guardianEl.textContent = todayEntry.guardian;
    if (todayEntry.guardian === 'FESTIVO') {
      guardianEl.style.color = 'var(--amber)';
    }
  } else {
    guardianEl.textContent = 'No asignado';
    guardianEl.style.color = 'var(--text-muted)';
  }
}

loadLeaders();
loadProjects();
loadGuardianToday();
setInterval(loadProjects, 15000);
setInterval(loadLeaders, 30000);
</script>
</body>
