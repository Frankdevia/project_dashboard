<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gantt Chart - Project Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e1117;
    --bg-card: #161b22;
    --bg-card-hover: #1c2129;
    --bg-input: #0d1117;
    --border: rgba(255,255,255,0.08);
    --border-focus: rgba(255,255,255,0.2);
    --text: #e6edf3;
    --text-muted: #8b949e;
    --text-dim: #484f58;
    --accent: #58a6ff;
    --red: #f85149;
    --amber: #d29922;
    --blue: #58a6ff;
    --green: #3fb950;
    --purple: #bc8cff;
    --radius: 16px;
    --radius-sm: 10px;
    --font-display: 'Outfit', sans-serif;
    --font-body: 'DM Sans', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    padding: 0;
  }

  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
  }

  .header {
    padding: 2.5rem 2rem 1.5rem;
    max-width: 1600px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 1rem;
  }

  .header-left h1 {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 2rem;
    letter-spacing: -0.03em;
    color: var(--text);
  }

  .header-left h1 span {
    color: var(--text-dim);
    font-weight: 300;
  }

  .header-left p {
    color: var(--text-muted);
    font-size: 0.875rem;
    margin-top: 0.25rem;
  }

  .nav-links {
    display: flex;
    gap: 10px;
  }

  .nav-links a {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0.6rem 1.2rem;
    color: var(--text);
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 500;
    transition: all 0.2s;
  }

  .nav-links a:hover {
    background: var(--bg-card-hover);
    border-color: var(--border-focus);
  }

  .nav-links a.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
  }

  .controls {
    max-width: 1600px;
    margin: 0 auto;
    padding: 0 2rem 1.5rem;
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    align-items: center;
  }

  .controls label {
    color: var(--text-muted);
    font-size: 0.85rem;
    font-weight: 500;
  }

  .controls select {
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0.5rem 0.9rem;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s;
    cursor: pointer;
  }

  .controls select:focus {
    border-color: var(--border-focus);
  }

  .zoom-controls {
    display: flex;
    gap: 5px;
    margin-left: auto;
  }

  .zoom-btn {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0.5rem 1rem;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }

  .zoom-btn:hover {
    background: var(--bg-card-hover);
    border-color: var(--border-focus);
  }

  .zoom-btn.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
  }

  .gantt-container {
    max-width: 1600px;
    margin: 0 auto;
    padding: 0 2rem 3rem;
  }

  .gantt-wrapper {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .gantt-scroll {
    overflow-x: auto;
    overflow-y: visible;
  }

  .gantt {
    min-width: 100%;
    display: table;
  }

  .gantt-header {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--bg-input);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .gantt-sidebar {
    min-width: 250px;
    max-width: 250px;
    padding: 1rem;
    border-right: 1px solid var(--border);
    font-weight: 600;
    font-size: 0.85rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    background: var(--bg-input);
  }

  .gantt-timeline-header {
    flex: 1;
    display: flex;
    background: var(--bg-input);
  }

  .gantt-row {
    display: flex;
    border-bottom: 1px solid var(--border);
    transition: background 0.2s;
  }

  .gantt-row:hover {
    background: rgba(255,255,255,0.02);
  }

  .gantt-row:last-child {
    border-bottom: none;
  }

  .gantt-row-sidebar {
    min-width: 250px;
    max-width: 250px;
    padding: 1rem;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
  }

  .project-name {
    font-weight: 600;
    font-size: 0.95rem;
    color: var(--text);
    font-family: var(--font-display);
  }

  .project-info {
    font-size: 0.75rem;
    color: var(--text-muted);
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .project-lider-chip {
    background: rgba(88,166,255,0.15);
    color: var(--accent);
    padding: 0.15rem 0.4rem;
    border-radius: 4px;
    font-weight: 600;
  }

  .project-status-chip {
    padding: 0.15rem 0.4rem;
    border-radius: 4px;
    font-weight: 600;
  }

  .gantt-row-timeline {
    flex: 1;
    position: relative;
    min-height: 60px;
  }

  .gantt-timeline-grid {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    display: flex;
  }

  .gantt-time-cell {
    flex: 1;
    border-right: 1px solid var(--border);
    position: relative;
  }

  .gantt-time-cell:last-child {
    border-right: none;
  }

  .gantt-header-cell {
    flex: 1;
    padding: 0.5rem;
    text-align: center;
    font-size: 0.75rem;
    color: var(--text-muted);
    border-right: 1px solid var(--border);
    font-weight: 500;
  }

  .gantt-header-cell:last-child {
    border-right: none;
  }

  .gantt-bar {
    position: absolute;
    height: 28px;
    top: 50%;
    transform: translateY(-50%);
    border-radius: 6px;
    padding: 0 0.5rem;
    display: flex;
    align-items: center;
    font-size: 0.75rem;
    font-weight: 600;
    color: #000;
    cursor: pointer;
    transition: all 0.2s;
    overflow: hidden;
    white-space: nowrap;
  }

  .gantt-bar:hover {
    filter: brightness(1.1);
    transform: translateY(-50%) scale(1.02);
    z-index: 5;
  }

  .gantt-bar-label {
    font-size: 0.7rem;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--text-dim);
    font-size: 0.9rem;
  }

  .empty-state .icon {
    font-size: 2.5rem;
    margin-bottom: 0.75rem;
    opacity: 0.3;
  }

  .today-line {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 2px;
    background: var(--red);
    z-index: 6;
    pointer-events: none;
  }

  .today-marker {
    position: absolute;
    top: -8px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--red);
    color: white;
    font-size: 0.65rem;
    padding: 0.15rem 0.4rem;
    border-radius: 4px;
    font-weight: 600;
    white-space: nowrap;
  }

  @media (max-width: 600px) {
    .header, .controls, .gantt-container {
      padding-left: 1rem;
      padding-right: 1rem;
    }
    .header h1 {
      font-size: 1.5rem;
    }
    .gantt-sidebar, .gantt-row-sidebar {
      min-width: 180px;
      max-width: 180px;
    }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>Gantt Chart <span>/ línea de tiempo</span></h1>
    <p id="subtitle">Cargando proyectos...</p>
  </div>
  <div class="nav-links">
    <a href="index.html">📊 Dashboard</a>
    <a href="gantt.html" class="active">📅 Gantt</a>
  </div>
</div>

<div class="controls">
  <label>Filtrar por líder:</label>
  <select id="filterLider">
    <option value="">Todos</option>
    <option value="Jorge Agudelo">Jorge Agudelo</option>
    <option value="Steven Solano">Steven Solano</option>
    <option value="Isaac Gomez">Isaac Gomez</option>
    <option value="Brian Escobar">Brian Escobar</option>
  </select>

  <label>Filtrar por estado:</label>
  <select id="filterEstado">
    <option value="">Todos</option>
    <option value="Inicio">Inicio</option>
    <option value="En progreso">En progreso</option>
    <option value="Avanzado">Avanzado</option>
    <option value="Completado">Completado</option>
  </select>

  <div class="zoom-controls">
    <label>Vista:</label>
    <button class="zoom-btn" data-zoom="day">Días</button>
    <button class="zoom-btn active" data-zoom="week">Semanas</button>
    <button class="zoom-btn" data-zoom="month">Meses</button>
  </div>
</div>

<div class="gantt-container">
  <div class="gantt-wrapper">
    <div class="gantt-scroll">
      <div class="gantt" id="gantt"></div>
    </div>
  </div>
</div>

<script>
// ── API layer ──
const API = '/api/projects';

async function api(method, path = '', body = null) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API + path, opts);
  if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
  return res.json();
}

// ── State ──
let projects = [];
let currentZoom = 'week';

const gantt = document.getElementById('gantt');
const subtitle = document.getElementById('subtitle');
const filterLider = document.getElementById('filterLider');
const filterEstado = document.getElementById('filterEstado');

// ── Color helpers ──
function colorFor(p) {
  if (p >= 100) return { color: '#3fb950', label: 'Completado' };
  if (p >= 75)  return { color: '#58a6ff', label: 'Avanzado' };
  if (p >= 40)  return { color: '#d29922', label: 'En progreso' };
  return { color: '#f85149', label: 'Inicio' };
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ── Date helpers ──
function parseDate(dateStr) {
  if (!dateStr) return null;
  return new Date(dateStr + 'T00:00:00');
}

function formatDate(date, format = 'short') {
  if (!date) return '';
  const options = format === 'short'
    ? { month: 'short', day: 'numeric' }
    : { year: 'numeric', month: 'short', day: 'numeric' };
  return date.toLocaleDateString('es-ES', options);
}

function addDays(date, days) {
  const result = new Date(date);
  result.setDate(result.getDate() + days);
  return result;
}

function getDaysBetween(start, end) {
  return Math.ceil((end - start) / (1000 * 60 * 60 * 24));
}

function getWeekNumber(date) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
}

function getMonthYear(date) {
  return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
}

// ── Timeline calculation ──
function calculateTimeline(filteredProjects) {
  if (filteredProjects.length === 0) return null;

  let minDate = null;
  let maxDate = null;

  filteredProjects.forEach(p => {
    const start = parseDate(p.fechaInicio);
    const end = parseDate(p.fechaFin);

    if (start) {
      if (!minDate || start < minDate) minDate = start;
    }
    if (end) {
      if (!maxDate || end > maxDate) maxDate = end;
    }
  });

  // If no dates, return null
  if (!minDate && !maxDate) return null;

  // Default to today if no dates
  const today = new Date();
  if (!minDate) minDate = addDays(today, -30);
  if (!maxDate) maxDate = addDays(today, 30);

  // Add padding
  minDate = addDays(minDate, -7);
  maxDate = addDays(maxDate, 7);

  return { minDate, maxDate };
}

function generateTimeUnits(minDate, maxDate, zoom) {
  const units = [];

  if (zoom === 'day') {
    let current = new Date(minDate);
    while (current <= maxDate) {
      units.push({
        date: new Date(current),
        label: formatDate(current, 'short'),
        key: current.toISOString().split('T')[0]
      });
      current = addDays(current, 1);
    }
  } else if (zoom === 'week') {
    let current = new Date(minDate);
    // Start from Monday
    const day = current.getDay();
    const diff = current.getDate() - day + (day === 0 ? -6 : 1);
    current.setDate(diff);

    while (current <= maxDate) {
      const weekNum = getWeekNumber(current);
      const weekEnd = addDays(current, 6);
      units.push({
        date: new Date(current),
        label: `S${weekNum}`,
        longLabel: `${formatDate(current)} - ${formatDate(weekEnd)}`,
        key: `${current.getFullYear()}-W${weekNum}`
      });
      current = addDays(current, 7);
    }
  } else if (zoom === 'month') {
    let current = new Date(minDate.getFullYear(), minDate.getMonth(), 1);

    while (current <= maxDate) {
      units.push({
        date: new Date(current),
        label: current.toLocaleDateString('es-ES', { month: 'short', year: 'numeric' }),
        key: getMonthYear(current)
      });
      current.setMonth(current.getMonth() + 1);
    }
  }

  return units;
}

// ── Render Gantt ──
function renderGantt() {
  // Apply filters
  const liderFilter = filterLider.value;
  const estadoFilter = filterEstado.value;

  let filteredProjects = projects.filter(p => p.fechaInicio || p.fechaFin);

  if (liderFilter) {
    filteredProjects = filteredProjects.filter(p => p.lider === liderFilter);
  }

  if (estadoFilter) {
    filteredProjects = filteredProjects.filter(p => {
      const c = colorFor(p.pct);
      return c.label === estadoFilter;
    });
  }

  // Sort by start date
  filteredProjects.sort((a, b) => {
    const aDate = parseDate(a.fechaInicio) || parseDate(a.fechaFin) || new Date();
    const bDate = parseDate(b.fechaInicio) || parseDate(b.fechaFin) || new Date();
    return aDate - bDate;
  });

  const timeline = calculateTimeline(filteredProjects);

  if (!timeline || filteredProjects.length === 0) {
    gantt.innerHTML = `<div class="empty-state"><div class="icon">📅</div>No hay proyectos con fechas asignadas que coincidan con los filtros</div>`;
    subtitle.textContent = 'Sin proyectos con fechas';
    return;
  }

  const { minDate, maxDate } = timeline;
  const timeUnits = generateTimeUnits(minDate, maxDate, currentZoom);
  const today = new Date();
  today.setHours(0, 0, 0, 0);

  subtitle.textContent = `${filteredProjects.length} proyecto${filteredProjects.length > 1 ? 's' : ''} · ${formatDate(minDate, 'long')} a ${formatDate(maxDate, 'long')}`;

  // Render header
  let html = `
    <div class="gantt-header">
      <div class="gantt-sidebar">Proyecto</div>
      <div class="gantt-timeline-header">
        ${timeUnits.map(unit => `<div class="gantt-header-cell" title="${unit.longLabel || ''}">${unit.label}</div>`).join('')}
      </div>
    </div>
  `;

  // Render rows
  filteredProjects.forEach(p => {
    const c = colorFor(p.pct);
    const start = parseDate(p.fechaInicio);
    const end = parseDate(p.fechaFin);

    // Calculate bar position and width
    let barHtml = '';
    if (start || end) {
      const barStart = start || end;
      const barEnd = end || start;

      const totalDays = getDaysBetween(minDate, maxDate);
      const startOffset = getDaysBetween(minDate, barStart);
      const duration = getDaysBetween(barStart, barEnd) || 1;

      const leftPercent = (startOffset / totalDays) * 100;
      const widthPercent = (duration / totalDays) * 100;

      barHtml = `
        <div class="gantt-bar"
             style="left: ${leftPercent}%; width: ${widthPercent}%; background: ${c.color};"
             title="${esc(p.name)} (${p.fechaInicio || '?'} - ${p.fechaFin || '?'})">
          <span class="gantt-bar-label">${Math.round(p.pct)}%</span>
        </div>
      `;
    }

    // Calculate today line position
    let todayLineHtml = '';
    if (today >= minDate && today <= maxDate) {
      const totalDays = getDaysBetween(minDate, maxDate);
      const todayOffset = getDaysBetween(minDate, today);
      const todayPercent = (todayOffset / totalDays) * 100;
      todayLineHtml = `
        <div class="today-line" style="left: ${todayPercent}%;">
          <div class="today-marker">Hoy</div>
        </div>
      `;
    }

    const liderChip = p.lider ? `<span class="project-lider-chip">${esc(p.lider)}</span>` : '';
    const statusChip = `<span class="project-status-chip" style="background: ${c.color}22; color: ${c.color}">${c.label}</span>`;

    html += `
      <div class="gantt-row">
        <div class="gantt-row-sidebar">
          <div class="project-name">${esc(p.name)}</div>
          <div class="project-info">
            ${liderChip}
            ${statusChip}
          </div>
        </div>
        <div class="gantt-row-timeline">
          <div class="gantt-timeline-grid">
            ${timeUnits.map(() => '<div class="gantt-time-cell"></div>').join('')}
          </div>
          ${todayLineHtml}
          ${barHtml}
        </div>
      </div>
    `;
  });

  gantt.innerHTML = html;
}

// ── Zoom controls ──
document.querySelectorAll('.zoom-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.zoom-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentZoom = btn.dataset.zoom;
    renderGantt();
  });
});

// ── Filters ──
filterLider.addEventListener('change', renderGantt);
filterEstado.addEventListener('change', renderGantt);

// ── Load projects ──
async function loadProjects() {
  try {
    projects = await api('GET');
    renderGantt();
  } catch (err) {
    subtitle.textContent = 'Error de conexión con el servidor';
    gantt.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div>Error al cargar proyectos</div>`;
  }
}

loadProjects();
setInterval(loadProjects, 15000);
</script>
</body>
</html>
