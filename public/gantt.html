<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gantt Chart - Project Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e1117;
    --bg-card: #161b22;
    --bg-card-hover: #1c2129;
    --bg-input: #0d1117;
    --border: rgba(255,255,255,0.08);
    --border-focus: rgba(255,255,255,0.2);
    --text: #e6edf3;
    --text-muted: #8b949e;
    --text-dim: #484f58;
    --accent: #58a6ff;
    --red: #f85149;
    --amber: #d29922;
    --blue: #58a6ff;
    --green: #3fb950;
    --purple: #bc8cff;
    --radius: 16px;
    --radius-sm: 10px;
    --font-display: 'Outfit', sans-serif;
    --font-body: 'DM Sans', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    padding: 0;
  }

  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
  }

  .header {
    padding: 2.5rem 2rem 1.5rem;
    max-width: 1600px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 1rem;
  }

  .header-left h1 {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 2rem;
    letter-spacing: -0.03em;
    color: var(--text);
  }

  .header-left h1 span {
    color: var(--text-dim);
    font-weight: 300;
  }

  .header-left p {
    color: var(--text-muted);
    font-size: 0.875rem;
    margin-top: 0.25rem;
  }

  .nav-links {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .nav-links a {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0.6rem 1.2rem;
    color: var(--text);
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 500;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .nav-links a svg {
    opacity: 0.7;
    transition: opacity 0.2s;
  }

  .nav-links a:hover {
    background: var(--bg-card-hover);
    border-color: var(--border-focus);
  }

  .nav-links a:hover svg {
    opacity: 1;
  }

  .nav-links a.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
  }

  .nav-links a.active svg {
    opacity: 1;
  }

  .controls {
    max-width: 1600px;
    margin: 0 auto;
    padding: 0 2rem 1.5rem;
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    align-items: center;
  }

  .controls label {
    color: var(--text-muted);
    font-size: 0.85rem;
    font-weight: 500;
  }

  .controls select {
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0.5rem 0.9rem;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s;
    cursor: pointer;
  }

  .controls select:focus {
    border-color: var(--border-focus);
  }

  .zoom-controls {
    display: flex;
    gap: 5px;
    margin-left: auto;
  }

  .zoom-btn {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0.5rem 1rem;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }

  .zoom-btn:hover {
    background: var(--bg-card-hover);
    border-color: var(--border-focus);
  }

  .zoom-btn.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
  }

  .gantt-container {
    max-width: 1600px;
    margin: 0 auto;
    padding: 0 2rem 3rem;
  }

  .gantt-wrapper {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .gantt-scroll {
    overflow-x: auto;
    overflow-y: visible;
    padding-bottom: 1rem;
  }

  .gantt-scroll::-webkit-scrollbar {
    height: 12px;
  }

  .gantt-scroll::-webkit-scrollbar-track {
    background: var(--bg-input);
    border-radius: 6px;
  }

  .gantt-scroll::-webkit-scrollbar-thumb {
    background: rgba(88,166,255,0.3);
    border-radius: 6px;
    transition: background 0.2s;
  }

  .gantt-scroll::-webkit-scrollbar-thumb:hover {
    background: rgba(88,166,255,0.5);
  }

  .gantt {
    min-width: max-content;
    display: table;
  }

  .gantt-header {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--bg-input);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .gantt-sidebar {
    min-width: 250px;
    max-width: 250px;
    padding: 1rem;
    border-right: 1px solid var(--border);
    font-weight: 600;
    font-size: 0.85rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    background: var(--bg-input);
  }

  .gantt-timeline-header {
    display: flex;
    background: var(--bg-input);
    min-width: max-content;
  }

  .gantt-row {
    display: flex;
    border-bottom: 1px solid var(--border);
    transition: background 0.2s;
  }

  .gantt-row:hover {
    background: rgba(255,255,255,0.02);
  }

  .gantt-row:last-child {
    border-bottom: none;
  }

  .gantt-row-sidebar {
    min-width: 250px;
    max-width: 250px;
    padding: 1rem;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
  }

  .project-name {
    font-weight: 600;
    font-size: 0.95rem;
    color: var(--text);
    font-family: var(--font-display);
  }

  .project-info {
    font-size: 0.75rem;
    color: var(--text-muted);
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .project-lider-chip {
    background: rgba(88,166,255,0.15);
    color: var(--accent);
    padding: 0.15rem 0.4rem;
    border-radius: 4px;
    font-weight: 600;
  }

  .project-status-chip {
    padding: 0.15rem 0.4rem;
    border-radius: 4px;
    font-weight: 600;
  }

  .gantt-row-timeline {
    position: relative;
    min-height: 60px;
    min-width: max-content;
    flex: 1;
  }

  .gantt-timeline-grid {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    display: flex;
  }

  .gantt-time-cell {
    min-width: 80px;
    width: 80px;
    border-right: 1px solid var(--border);
    position: relative;
    flex-shrink: 0;
  }

  .gantt-time-cell:last-child {
    border-right: none;
  }

  .gantt-header-cell {
    min-width: 80px;
    width: 80px;
    padding: 0.5rem;
    text-align: center;
    font-size: 0.75rem;
    color: var(--text-muted);
    border-right: 1px solid var(--border);
    font-weight: 500;
    flex-shrink: 0;
  }

  .gantt-header-cell:last-child {
    border-right: none;
  }

  .gantt-bar {
    position: absolute;
    height: 28px;
    top: 50%;
    transform: translateY(-50%);
    border-radius: 6px;
    padding: 0 0.5rem;
    display: flex;
    align-items: center;
    font-size: 0.75rem;
    font-weight: 600;
    color: #000;
    cursor: pointer;
    transition: all 0.2s;
    overflow: hidden;
    white-space: nowrap;
  }

  .gantt-bar:hover {
    filter: brightness(1.1);
    transform: translateY(-50%) scale(1.02);
    z-index: 5;
  }

  .gantt-bar-label {
    font-size: 0.7rem;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--text-dim);
    font-size: 0.9rem;
  }

  .empty-state .icon {
    font-size: 2.5rem;
    margin-bottom: 0.75rem;
    opacity: 0.3;
  }

  .today-line {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 2px;
    background: var(--red);
    z-index: 6;
    pointer-events: none;
  }

  .today-marker {
    position: absolute;
    top: -8px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--red);
    color: white;
    font-size: 0.65rem;
    padding: 0.15rem 0.4rem;
    border-radius: 4px;
    font-weight: 600;
    white-space: nowrap;
  }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 5000; align-items: center; justify-content: center; padding: 1rem; backdrop-filter: blur(4px); animation: fadeIn 0.2s ease-out; }
  .modal-overlay.open { display: flex; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal { background: var(--bg-card); border: 1px solid var(--border-focus); border-radius: var(--radius); padding: 1.75rem; width: 100%; max-width: 600px; animation: slideUp 0.25s ease-out; max-height: 90vh; overflow-y: auto; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

  .detail-header { text-align: center; padding-bottom: 1rem; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; }
  .detail-header h3 { font-family: var(--font-display); font-weight: 600; font-size: 1.3rem; margin-bottom: 0.5rem; color: var(--text); }
  .detail-header .project-lider { display: inline-block; background: rgba(88,166,255,0.15); color: var(--accent); padding: 0.3rem 0.7rem; border-radius: 6px; font-size: 0.8rem; font-weight: 600; margin-bottom: 0.5rem; }
  .detail-header .project-status { display: inline-block; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; padding: 0.3rem 0.8rem; border-radius: 6px; }
  .detail-section { margin-bottom: 1.5rem; }
  .detail-section h4 { font-family: var(--font-display); font-weight: 600; font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
  .detail-section p { color: var(--text); font-size: 0.95rem; line-height: 1.6; margin: 0; }
  .detail-section .empty-value { color: var(--text-dim); font-style: italic; }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
  .detail-item { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0.8rem; }
  .detail-item label { display: block; font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; margin-bottom: 0.3rem; }
  .detail-item .value { font-size: 1rem; color: var(--text); font-weight: 500; }
  .detail-item .value.highlight { color: var(--green); font-weight: 700; font-size: 1.2rem; font-family: var(--font-display); }
  .detail-actions { display: flex; gap: 10px; justify-content: flex-end; padding-top: 1rem; border-top: 1px solid var(--border); }
  .detail-actions button { border: none; border-radius: var(--radius-sm); padding: 0.6rem 1.4rem; font-family: var(--font-body); font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: opacity 0.15s, transform 0.1s; }
  .detail-actions button:active { transform: scale(0.97); }
  .detail-actions .btn-edit { background: var(--accent); color: #000; }
  .detail-actions .btn-edit:hover { opacity: 0.85; }
  .detail-actions .btn-close { background: transparent; color: var(--text-muted); border: 1px solid var(--border) !important; }
  .detail-actions .btn-close:hover { color: var(--text); border-color: var(--border-focus) !important; }

  @media (max-width: 600px) {
    .header, .controls, .gantt-container {
      padding-left: 1rem;
      padding-right: 1rem;
    }
    .header h1 {
      font-size: 1.5rem;
    }
    .gantt-sidebar, .gantt-row-sidebar {
      min-width: 180px;
      max-width: 180px;
    }
  }
</style>
</head>

<script>
// ── API layer ──
const API = '/api/projects';

async function api(method, path = '', body = null) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API + path, opts);
  if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
  return res.json();
}

// ── State ──
let projects = [];
let leaders = [];
let currentZoom = 'week';

const gantt = document.getElementById('gantt');
const subtitle = document.getElementById('subtitle');
const filterLider = document.getElementById('filterLider');
const filterEstado = document.getElementById('filterEstado');

// ── Color helpers ──
function colorFor(p) {
  if (p >= 100) return { color: '#3fb950', label: 'Completado' };
  if (p >= 75)  return { color: '#58a6ff', label: 'Avanzado' };
  if (p >= 40)  return { color: '#d29922', label: 'En progreso' };
  return { color: '#f85149', label: 'Inicio' };
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ── Date helpers ──
function parseDate(dateStr) {
  if (!dateStr) return null;
  return new Date(dateStr + 'T00:00:00');
}

function formatDate(date, format = 'short') {
  if (!date) return '';
  const options = format === 'short'
    ? { month: 'short', day: 'numeric' }
    : { year: 'numeric', month: 'short', day: 'numeric' };
  return date.toLocaleDateString('es-ES', options);
}

function addDays(date, days) {
  const result = new Date(date);
  result.setDate(result.getDate() + days);
  return result;
}

function getDaysBetween(start, end) {
  return Math.ceil((end - start) / (1000 * 60 * 60 * 24));
}

function getWeekNumber(date) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
}

function getMonthYear(date) {
  return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
}

// ── Timeline calculation ──
function calculateTimeline(filteredProjects) {
  // Fixed range: January 1, 2026 to December 31, 2026
  const minDate = new Date(2026, 0, 1);  // January 1, 2026
  const maxDate = new Date(2026, 11, 31); // December 31, 2026

  return { minDate, maxDate };
}

function generateTimeUnits(minDate, maxDate, zoom) {
  const units = [];

  if (zoom === 'day') {
    let current = new Date(minDate);
    while (current <= maxDate) {
      units.push({
        date: new Date(current),
        label: formatDate(current, 'short'),
        key: current.toISOString().split('T')[0]
      });
      current = addDays(current, 1);
    }
  } else if (zoom === 'week') {
    let current = new Date(minDate);
    // Start from Monday
    const day = current.getDay();
    const diff = current.getDate() - day + (day === 0 ? -6 : 1);
    current.setDate(diff);

    while (current <= maxDate) {
      const weekNum = getWeekNumber(current);
      const weekEnd = addDays(current, 6);
      units.push({
        date: new Date(current),
        label: `S${weekNum}`,
        longLabel: `${formatDate(current)} - ${formatDate(weekEnd)}`,
        key: `${current.getFullYear()}-W${weekNum}`
      });
      current = addDays(current, 7);
    }
  } else if (zoom === 'month') {
    let current = new Date(minDate.getFullYear(), minDate.getMonth(), 1);

    while (current <= maxDate) {
      units.push({
        date: new Date(current),
        label: current.toLocaleDateString('es-ES', { month: 'short', year: 'numeric' }),
        key: getMonthYear(current)
      });
      current.setMonth(current.getMonth() + 1);
    }
  }

  return units;
}

// ── Render Gantt ──
function renderGantt() {
  // Apply filters
  const liderFilter = filterLider.value;
  const estadoFilter = filterEstado.value;

  let filteredProjects = projects.filter(p => p.fechaInicio || p.fechaFin);

  if (liderFilter) {
    filteredProjects = filteredProjects.filter(p => p.lider === liderFilter);
  }

  if (estadoFilter) {
    filteredProjects = filteredProjects.filter(p => {
      const c = colorFor(p.pct);
      return c.label === estadoFilter;
    });
  }

  // Sort by start date
  filteredProjects.sort((a, b) => {
    const aDate = parseDate(a.fechaInicio) || parseDate(a.fechaFin) || new Date();
    const bDate = parseDate(b.fechaInicio) || parseDate(b.fechaFin) || new Date();
    return aDate - bDate;
  });

  const timeline = calculateTimeline(filteredProjects);

  if (!timeline || filteredProjects.length === 0) {
    gantt.innerHTML = `<div class="empty-state"><div class="icon">📅</div>No hay proyectos con fechas asignadas que coincidan con los filtros</div>`;
    subtitle.textContent = 'Sin proyectos con fechas';
    return;
  }

  const { minDate, maxDate } = timeline;
  const timeUnits = generateTimeUnits(minDate, maxDate, currentZoom);
  const today = new Date();
  today.setHours(0, 0, 0, 0);

  subtitle.textContent = `${filteredProjects.length} proyecto${filteredProjects.length > 1 ? 's' : ''} · ${formatDate(minDate, 'long')} a ${formatDate(maxDate, 'long')}`;

  // Render header
  let html = `
    <div class="gantt-header">
      <div class="gantt-sidebar">Proyecto</div>
      <div class="gantt-timeline-header">
        ${timeUnits.map(unit => `<div class="gantt-header-cell" title="${unit.longLabel || ''}">${unit.label}</div>`).join('')}
      </div>
    </div>
  `;

  // Render rows
  filteredProjects.forEach(p => {
    const c = colorFor(p.pct);
    const start = parseDate(p.fechaInicio);
    const end = parseDate(p.fechaFin);

    // Calculate bar position and width
    let barHtml = '';
    if (start || end) {
      const barStart = start || end;
      const barEnd = end || start;

      const totalDays = getDaysBetween(minDate, maxDate);
      const startOffset = getDaysBetween(minDate, barStart);
      const duration = getDaysBetween(barStart, barEnd) || 1;

      const leftPercent = (startOffset / totalDays) * 100;
      const widthPercent = (duration / totalDays) * 100;

      barHtml = `
        <div class="gantt-bar"
             style="left: ${leftPercent}%; width: ${widthPercent}%; background: ${c.color};"
             title="${esc(p.name)} (${p.fechaInicio || '?'} - ${p.fechaFin || '?'})"
             data-project-id="${p.id}">
          <span class="gantt-bar-label">${Math.round(p.pct)}%</span>
        </div>
      `;
    }

    // Calculate today line position
    let todayLineHtml = '';
    if (today >= minDate && today <= maxDate) {
      const totalDays = getDaysBetween(minDate, maxDate);
      const todayOffset = getDaysBetween(minDate, today);
      const todayPercent = (todayOffset / totalDays) * 100;
      todayLineHtml = `
        <div class="today-line" style="left: ${todayPercent}%;">
          <div class="today-marker">Hoy</div>
        </div>
      `;
    }

    const liderChip = p.lider ? `<span class="project-lider-chip">${esc(p.lider)}</span>` : '';
    const statusChip = `<span class="project-status-chip" style="background: ${c.color}22; color: ${c.color}">${c.label}</span>`;

    html += `
      <div class="gantt-row">
        <div class="gantt-row-sidebar">
          <div class="project-name">${esc(p.name)}</div>
          <div class="project-info">
            ${liderChip}
            ${statusChip}
          </div>
        </div>
        <div class="gantt-row-timeline">
          <div class="gantt-timeline-grid">
            ${timeUnits.map(() => '<div class="gantt-time-cell"></div>').join('')}
          </div>
          ${todayLineHtml}
          ${barHtml}
        </div>
      </div>
    `;
  });

  gantt.innerHTML = html;

  // Add click handlers to bars
  document.querySelectorAll('.gantt-bar').forEach(bar => {
    bar.addEventListener('click', (e) => {
      e.stopPropagation();
      const projectId = bar.dataset.projectId;
      const project = projects.find(p => p.id === projectId);
      if (project) {
        openDetailModal(project);
      }
    });
  });
}

// ── Detail Modal ──
const detailOverlay = document.getElementById('detailOverlay');

function openDetailModal(p) {
  const c = colorFor(p.pct);

  document.getElementById('detailName').textContent = p.name;

  const liderBadge = document.getElementById('detailLiderBadge');
  if (p.lider) {
    liderBadge.innerHTML = `<span class="project-lider">${esc(p.lider)}</span>`;
  } else {
    liderBadge.innerHTML = '';
  }

  const statusBadge = document.getElementById('detailStatusBadge');
  statusBadge.innerHTML = `<div class="project-status" style="background: ${c.color}22; color: ${c.color}">${c.label}</div>`;

  document.getElementById('detailPct').textContent = Math.round(p.pct) + '%';
  document.getElementById('detailPct').style.color = c.color;
  document.getElementById('detailHours').textContent = (p.hours || 0).toLocaleString() + 'h';

  const descSection = document.getElementById('detailDescSection');
  const descText = document.getElementById('detailDesc');
  if (p.descripcion) {
    descText.textContent = p.descripcion;
    descText.classList.remove('empty-value');
  } else {
    descText.textContent = 'Sin descripción';
    descText.classList.add('empty-value');
  }

  const depSection = document.getElementById('detailDepSection');
  const depText = document.getElementById('detailDep');
  if (p.dep) {
    depText.textContent = p.dep;
    depText.classList.remove('empty-value');
  } else {
    depText.textContent = 'Sin dependencia asignada';
    depText.classList.add('empty-value');
  }

  const fechaInicioVal = document.getElementById('detailFechaInicio');
  fechaInicioVal.textContent = p.fechaInicio || '—';
  if (!p.fechaInicio) fechaInicioVal.classList.add('empty-value');
  else fechaInicioVal.classList.remove('empty-value');

  const fechaFinVal = document.getElementById('detailFechaFin');
  fechaFinVal.textContent = p.fechaFin || '—';
  if (!p.fechaFin) fechaFinVal.classList.add('empty-value');
  else fechaFinVal.classList.remove('empty-value');

  detailOverlay.classList.add('open');

  // Store project ID for edit button
  document.getElementById('detailEdit').onclick = () => {
    window.location.href = `index.html?edit=${p.id}`;
  };
}

function closeDetailModal() {
  detailOverlay.classList.remove('open');
}

document.getElementById('detailClose').addEventListener('click', closeDetailModal);
detailOverlay.addEventListener('click', (e) => {
  if (e.target === detailOverlay) closeDetailModal();
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && detailOverlay.classList.contains('open')) {
    closeDetailModal();
  }
});

// ── Zoom controls ──
document.querySelectorAll('.zoom-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.zoom-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentZoom = btn.dataset.zoom;
    renderGantt();
  });
});

// ── Filters ──
filterLider.addEventListener('change', renderGantt);
filterEstado.addEventListener('change', renderGantt);

// ── Load leaders ──
async function loadLeaders() {
  try {
    const res = await fetch('/api/leaders');
    leaders = await res.json();
    populateLeaderDropdown();
  } catch (err) {
    console.error('Error loading leaders:', err);
  }
}

function populateLeaderDropdown() {
  const currentValue = filterLider.value;
  const options = leaders.map(l => `<option value="${l.name}">${l.name}</option>`).join('');
  filterLider.innerHTML = '<option value="">Todos</option>' + options;
  filterLider.value = currentValue;
}

// ── Load projects ──
async function loadProjects() {
  try {
    projects = await api('GET');
    renderGantt();
  } catch (err) {
    subtitle.textContent = 'Error de conexión con el servidor';
    gantt.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div>Error al cargar proyectos</div>`;
  }
}

loadLeaders();
loadProjects();
setInterval(loadProjects, 15000);
setInterval(loadLeaders, 30000);
</script>
